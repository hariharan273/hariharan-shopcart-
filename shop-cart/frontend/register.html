<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Quick Shopping</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        localStorage.setItem('temp_lang', 'en');
    </script>
    <style>
        body { background: #0f1117; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }

        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 16px;
        }

        .login-card {
            background: #1a1f2e;
            border: 1px solid #1f2937;
            border-radius: 24px;
            padding: 36px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            position: relative;
        }

        .lang-select-top {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lang-select-top select {
            background: #111827;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            color: #d1d5db;
            outline: none;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }

        .login-title {
            font-size: 26px;
            font-weight: 800;
            color: #f9fafb;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            margin-top: 16px;
        }
        .login-sub {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .form-field { margin-bottom: 18px; }
        .form-field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-field input {
            width: 100%;
            background: #111827;
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 13px 16px;
            font-size: 14px;
            color: #f9fafb;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }
        .form-field input:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(6,182,212,0.15);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 6px;
            letter-spacing: 0.3px;
            background: linear-gradient(135deg, #06b6d4, #10b981);
            color: white;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .btn-login:active { transform: translateY(0); }

        .links-row {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #6b7280;
        }
        .links-row a { color: #22d3ee; text-decoration: none; font-weight: 600; }
        .links-row a:hover { color: #67e8f9; }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #6b7280;
            text-decoration: none;
            margin-bottom: 12px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #d1d5db; }

    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            
            <a href="index.html" class="back-link">← Back to Home</a>
            
            <div class="lang-select-top">
                <span style="font-size: 12px; color: #6b7280;">🌐</span>
                <select id="langSelect" onchange="changeTempLang(this.value)">
                    <option value="en">English</option>
                    <option value="ta">தமிழ் (Tamil)</option>
                    <option value="te">తెలుగు (Telugu)</option>
                </select>
            </div>

            <h1 class="login-title" data-i18n="register_btn">Create Account</h1>
            <p class="login-sub">Join Quick Shopping and start browsing.</p>

            <form id="registerForm">
                <div class="form-field">
                    <label data-i18n="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-field">
                    <label data-i18n="mobile">Mobile Number</label>
                    <input type="text" id="mobile" placeholder="+91 9876543210" required>
                </div>
                <div class="form-field">
                    <label data-i18n="email">Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
                <div class="form-field">
                    <label data-i18n="password">Password</label>
                    <input type="password" id="password" placeholder="Create a strong password" required>
                </div>
                <button type="submit" class="btn-login" id="regBtn" data-i18n="register_btn">Register</button>
            </form>

            <div class="links-row">
                Already have an account? <a href="login.html">Login Here</a>
            </div>
        </div>
    </div>

    <div id="voice-fab" class="fab-voice" style="display:none;">🎤</div>

    <script src="js/api.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/voice.js"></script>
    <script>
        document.getElementById('langSelect').value = 'en';

        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role');
        if (role) {
            const loginLink = document.querySelector('.links-row a');
            if (loginLink) loginLink.href = `login.html?role=${role}`;
        }

        function changeTempLang(lang) {
            localStorage.setItem('temp_lang', lang);
            applyTranslations();
            speak(getTranslatedText('language_changed'));
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const data = {
                name: document.getElementById('name').value,
                mobile: document.getElementById('mobile').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            
            btn.textContent = 'Registering...';
            btn.disabled = true;

            try {
                const res = await api.post('/auth/register', data);
                
                // Show pop-up with the real-time OTP!
                alert("Your Verification OTP is: " + res.otp);
                
                localStorage.setItem('otp_contact', data.mobile);
                const roleParam = role ? `?role=${role}` : '';
                window.location.href = `otp.html${roleParam}`;
            } catch (err) {
                alert(err.message || "Registration failed");
                btn.textContent = 'Register';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
