<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Application - Quick Shopping</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #0f1117;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .apply-container {
            width: 100%;
            max-width: 440px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .apply-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .apply-header h2 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .apply-header p {
            font-size: 13px;
            color: #9ca3af;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #374151;
            border-radius: 10px;
            background-color: #374151;
            font-size: 14px;
            color: #f9fafb;
            outline: none;
            resize: none;
            height: 80px;
            transition: all 0.2s ease;
        }
        textarea:focus {
            border-color: #10b981;
            background-color: #1f2937;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
        .back-link {
            display: block;
            text-align: center;
            font-size: 13px;
            color: #9ca3af;
            text-decoration: none;
            margin-top: 16px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #10b981;
        }
    </style>
</head>
<body>

<div class="apply-container">
    <div class="apply-header">
        <h2>💼 Seller Portal</h2>
        <p>Apply for an account or check your application status</p>
    </div>

    <!-- TABS -->
    <div style="display:flex; gap:10px; margin-bottom: 20px;">
        <button class="btn" id="tabApply" onclick="switchTab('apply')" style="flex:1; background:#10b981; color:white;">Apply as Seller</button>
        <button class="btn" id="tabStatus" onclick="switchTab('status')" style="flex:1; background:transparent; color:#9ca3af; border:1px solid #374151;">Check Status</button>
    </div>

    <!-- APPLY FORM -->
    <form id="sellerApplyForm">
        <div class="form-row">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="name" placeholder="e.g. John Doe" required>
            </div>
            <div class="form-group">
                <label>Business Name</label>
                <input type="text" id="businessName" placeholder="e.g. JD Tech Store" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="phone" placeholder="10-digit number" required pattern="^[0-9]{10}$" title="Please enter a valid 10-digit phone number">
            </div>
        </div>

        <div class="form-group">
            <label>GST Number</label>
            <input type="text" id="gstNumber" placeholder="15-digit GSTIN" required pattern="^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$" title="Please enter a valid 15-digit Indian GST number format">
        </div>

        <div class="form-group">
            <label>Business Address</label>
            <textarea id="address" placeholder="Enter physical store or office address" required></textarea>
        </div>

        <button type="submit" class="btn" style="background: linear-gradient(135deg, #10b981, #3b82f6); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);">Submit Application</button>
    </form>

    <!-- STATUS CHECK FORM -->
    <div id="statusSection" style="display:none;">
        <div class="form-group">
            <label>Enter Application Email</label>
            <input type="email" id="checkEmail" placeholder="john@example.com">
        </div>
        <button class="btn" onclick="checkStatus()" style="background:#3b82f6; margin-bottom: 15px;">Check Status</button>
        
        <div id="statusMessage" style="font-size: 14px; font-weight: 500; text-align: center; margin-bottom: 15px; padding: 10px; border-radius: 8px; display: none;"></div>

        <!-- PASSWORD SETUP FORM (HIDDEN UNTIL APPROVED) -->
        <form id="registerForm" style="display:none; margin-top:20px; border-top: 1px solid #374151; padding-top: 20px;">
            <p style="font-size: 13px; color:#10b981; margin-bottom: 15px; font-weight: 600;">Your application is approved! Please set a password to complete registration.</p>
            <div class="form-group">
                <label>Set Account Password</label>
                <input type="password" id="regPassword" placeholder="Create a strong password" required minlength="6">
            </div>
            <button type="submit" class="btn" style="background:#10b981;">Complete Registration & Login</button>
        </form>
    </div>

    <a href="login.html" class="back-link">← Back to Login</a>
</div>

<script src="js/api.js"></script>
<script>
    function switchTab(tab) {
        document.getElementById('sellerApplyForm').style.display = tab === 'apply' ? 'block' : 'none';
        document.getElementById('statusSection').style.display = tab === 'status' ? 'block' : 'none';
        
        document.getElementById('tabApply').style.background = tab === 'apply' ? '#10b981' : 'transparent';
        document.getElementById('tabApply').style.color = tab === 'apply' ? 'white' : '#9ca3af';
        document.getElementById('tabApply').style.border = tab === 'apply' ? 'none' : '1px solid #374151';
        
        document.getElementById('tabStatus').style.background = tab === 'status' ? '#3b82f6' : 'transparent';
        document.getElementById('tabStatus').style.color = tab === 'status' ? 'white' : '#9ca3af';
        document.getElementById('tabStatus').style.border = tab === 'status' ? 'none' : '1px solid #374151';
    }

    document.getElementById('sellerApplyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const payload = {
            name: document.getElementById('name').value,
            businessName: document.getElementById('businessName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            gstNumber: document.getElementById('gstNumber').value,
            address: document.getElementById('address').value
        };

        try {
            await api.post('/seller/apply', payload);
            alert('✅ Application submitted! Please check your status here later to register your password.');
            switchTab('status');
        } catch (err) { }
    });

    let approvedEmail = null;

    async function checkStatus() {
        const email = document.getElementById('checkEmail').value;
        if(!email) return alert('Please enter your email');
        
        const msgBox = document.getElementById('statusMessage');
        const regForm = document.getElementById('registerForm');
        msgBox.style.display = 'block';
        regForm.style.display = 'none';
        msgBox.textContent = "Checking...";
        msgBox.style.background = "transparent";

        try {
            const res = await api.post('/seller/status', { email });
            if(res.status === 'pending') {
                msgBox.textContent = "⏳ Your application is still under review by the Admin.";
                msgBox.style.background = "rgba(245, 158, 11, 0.1)";
                msgBox.style.color = "#f59e0b";
            } else if(res.status === 'rejected') {
                msgBox.textContent = "❌ Sorry, your application was rejected.";
                msgBox.style.background = "rgba(239, 68, 68, 0.1)";
                msgBox.style.color = "#ef4444";
            } else if(res.status === 'approved') {
                msgBox.textContent = "✅ Approved!";
                msgBox.style.background = "rgba(16, 185, 129, 0.1)";
                msgBox.style.color = "#10b981";
                approvedEmail = email;
                regForm.style.display = 'block';
            }
        } catch(err) {
            msgBox.textContent = "Application not found for this email.";
            msgBox.style.background = "rgba(239, 68, 68, 0.1)";
            msgBox.style.color = "#ef4444";
        }
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('regPassword').value;
        if(!approvedEmail) return;

        try {
            const res = await api.post('/seller/register', { email: approvedEmail, password });
            alert('Registration complete! Logging you in...');
            
            // Log them in natively
            setUser(res.user);
            window.location.href = 'seller.html';
        } catch(err) { }
    });
</script>

</body>
</html>
